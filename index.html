<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cascade — a themed match-3</title>
    <meta name="description" content="Swap, match, and chain cascade combos across worlds that shift beneath you. A themed match-3, playable in your browser." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Open Graph / Twitter link preview. og:image is relative for now; at deploy
         time set it (and add og:url) to the absolute deployed URL for scrapers that
         require it (Twitter/Facebook). Modern scrapers resolve relative fine. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cascade" />
    <meta property="og:title" content="Cascade — a themed match-3" />
    <meta property="og:description" content="Swap, match, and chain cascade combos across worlds that shift beneath you." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cascade — a themed match-3" />
    <meta name="twitter:description" content="Swap, match, and chain cascade combos across worlds that shift beneath you." />
    <meta name="twitter:image" content="/og.png" />
    <style>
      html, body, #root { margin: 0; height: 100%; overscroll-behavior: none; }
      /* The game owns all taps/drags (tile select, swap-drag); without touch-action:none
         a phone browser treats a swap-drag as a page pan/pinch instead of feeding the
         canvas pointer handlers. */
      html, body, #root { touch-action: none; -webkit-user-select: none; user-select: none; }
      #root { width: 100vw; height: 100vh; height: 100dvh; } /* dvh: mobile URL-bar collapse */
      body { background: #0b0d16; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
